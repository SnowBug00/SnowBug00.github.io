<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Fond blanc -->
  <rect width="680" height="620" fill="#ffffff"/>

  <!-- Titre -->
  <text font-size="14" font-weight="600" fill="#1a1a1a" x="340" y="28" text-anchor="middle">Projet 1 — Réseau Barolux, site Auchan Differdange</text>

  <!-- ===== Nuage Internet ===== -->
  <ellipse cx="340" cy="88" rx="54" ry="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
  <ellipse cx="308" cy="100" rx="34" ry="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
  <ellipse cx="372" cy="100" rx="34" ry="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
  <text font-size="14" font-weight="600" fill="#1e40af" x="340" y="93" text-anchor="middle" dominant-baseline="central">Internet</text>

  <!-- Lien WAN -->
  <line x1="340" y1="116" x2="340" y2="148" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-size="11" fill="#6b7280" x="354" y="135">WAN</text>

  <!-- ===== Pare-feu Fortinet ===== -->
  <rect x="248" y="148" width="184" height="48" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="0.8"/>
  <text font-size="14" font-weight="600" fill="#991b1b" x="340" y="168" text-anchor="middle" dominant-baseline="central">Pare-feu Fortinet</text>
  <text font-size="11" fill="#b91c1c" x="340" y="186" text-anchor="middle" dominant-baseline="central">Routeur / Sécurité</text>

  <!-- Lien Fortinet vers Switch cœur -->
  <line x1="340" y1="196" x2="340" y2="238" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-size="11" fill="#6b7280" x="354" y="219">Fibre</text>

  <!-- ===== Switch cœur Hirschmann 1 ===== -->
  <rect x="220" y="238" width="240" height="52" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-size="14" font-weight="600" fill="#065f46" x="340" y="258" text-anchor="middle" dominant-baseline="central">Switch cœur — Hirschmann 1</text>
  <text font-size="11" fill="#047857" x="340" y="276" text-anchor="middle" dominant-baseline="central">Cœur de réseau</text>

  <!-- Légende fibre -->
  <text font-size="11" fill="#6b7280" x="340" y="302" text-anchor="middle">Interconnexion en fibre optique vers 5 switches de distribution</text>

  <!-- ===== Liens fibre vers switches de distribution ===== -->
  <!-- vers Switch 2 -->
  <line x1="222" y1="264" x2="101" y2="338" stroke="#059669" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <!-- vers Switch 3 -->
  <line x1="240" y1="290" x2="215" y2="338" stroke="#059669" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <!-- vers Switch 4 -->
  <line x1="340" y1="290" x2="340" y2="338" stroke="#059669" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <!-- vers Switch 5 -->
  <line x1="440" y1="290" x2="466" y2="338" stroke="#059669" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <!-- vers Switch 6 -->
  <line x1="458" y1="264" x2="579" y2="338" stroke="#059669" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>

  <!-- ===== Switch 2 ===== -->
  <rect x="34" y="338" width="134" height="48" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" fill="#065f46" x="101" y="358" text-anchor="middle" dominant-baseline="central">Hirschmann 2</text>
  <text font-size="11" fill="#047857" x="101" y="376" text-anchor="middle" dominant-baseline="central">Distribution Aile A</text>

  <!-- ===== Switch 3 ===== -->
  <rect x="148" y="338" width="134" height="48" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" fill="#065f46" x="215" y="358" text-anchor="middle" dominant-baseline="central">Hirschmann 3</text>
  <text font-size="11" fill="#047857" x="215" y="376" text-anchor="middle" dominant-baseline="central">Distribution Aile B</text>

  <!-- ===== Switch 4 ===== -->
  <rect x="272" y="338" width="136" height="48" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" fill="#065f46" x="340" y="358" text-anchor="middle" dominant-baseline="central">Hirschmann 4</text>
  <text font-size="11" fill="#047857" x="340" y="376" text-anchor="middle" dominant-baseline="central">Distribution Centre</text>

  <!-- ===== Switch 5 ===== -->
  <rect x="398" y="338" width="136" height="48" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" fill="#065f46" x="466" y="358" text-anchor="middle" dominant-baseline="central">Hirschmann 5</text>
  <text font-size="11" fill="#047857" x="466" y="376" text-anchor="middle" dominant-baseline="central">Distribution Aile C</text>

  <!-- ===== Switch 6 ===== -->
  <rect x="512" y="338" width="136" height="48" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" fill="#065f46" x="580" y="358" text-anchor="middle" dominant-baseline="central">Hirschmann 6</text>
  <text font-size="11" fill="#047857" x="580" y="376" text-anchor="middle" dominant-baseline="central">Distribution Aile D</text>

  <!-- ===== Postes RJ45 sous Switch 2 ===== -->
  <line x1="101" y1="386" x2="68" y2="430" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="101" y1="386" x2="101" y2="430" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="101" y1="386" x2="134" y2="430" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <rect x="46" y="430" width="30" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <rect x="86" y="430" width="30" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <rect x="120" y="430" width="30" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text font-size="11" fill="#6b7280" x="101" y="466" text-anchor="middle">Postes RJ45</text>

  <!-- ===== Postes RJ45 sous Switch 4 ===== -->
  <line x1="340" y1="386" x2="307" y2="430" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="340" y1="386" x2="340" y2="430" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="340" y1="386" x2="373" y2="430" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <rect x="285" y="430" width="30" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <rect x="325" y="430" width="30" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <rect x="359" y="430" width="30" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text font-size="11" fill="#6b7280" x="340" y="466" text-anchor="middle">Postes RJ45</text>

  <!-- ===== Postes RJ45 sous Switch 6 ===== -->
  <line x1="580" y1="386" x2="547" y2="430" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="580" y1="386" x2="580" y2="430" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="580" y1="386" x2="613" y2="430" stroke="#9ca3af" stroke-width="0.8" marker-end="url(#arrow)"/>
  <rect x="525" y="430" width="30" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <rect x="565" y="430" width="30" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <rect x="599" y="430" width="30" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text font-size="11" fill="#6b7280" x="580" y="466" text-anchor="middle">Postes RJ45</text>

  <!-- ===== Légende ===== -->
  <rect x="40" y="488" width="600" height="112" rx="8" fill="none" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text font-size="13" font-weight="600" fill="#1a1a1a" x="60" y="510">Légende</text>

  <line x1="60" y1="530" x2="110" y2="530" stroke="#059669" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text font-size="11" fill="#374151" x="118" y="534">Fibre optique (interconnexion switches)</text>

  <line x1="60" y1="554" x2="110" y2="554" stroke="#9ca3af" stroke-width="1.5"/>
  <text font-size="11" fill="#374151" x="118" y="558">Câble RJ45 (vers postes utilisateurs)</text>

  <rect x="60" y="567" width="16" height="10" rx="3" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-size="11" fill="#374151" x="84" y="577">Switch Hirschmann</text>

  <rect x="240" y="567" width="16" height="10" rx="3" fill="#fee2e2" stroke="#f87171" stroke-width="0.8"/>
  <text font-size="11" fill="#374151" x="264" y="577">Pare-feu Fortinet</text>

  <rect x="410" y="567" width="16" height="10" rx="3" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.8"/>
  <text font-size="11" fill="#374151" x="434" y="577">Postes utilisateurs</text>
