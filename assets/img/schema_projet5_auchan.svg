<svg width="620" height="370" viewBox="0 0 620 370" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="620" height="370" fill="#ffffff"/>

  <!-- Titre -->
  <text font-size="13" font-weight="700" fill="#1a1a1a" x="310" y="22" text-anchor="middle">Projet 5 — Interventions sur les caisses Extenda, sites Auchan Luxembourg</text>

  <!-- ── 3 MAGASINS ── -->

  <!-- Kirchberg -->
  <rect x="30" y="40" width="160" height="64" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text font-size="12" font-weight="700" fill="#1e40af" x="110" y="60" text-anchor="middle">Kirchberg</text>
  <rect x="70" y="70" width="30" height="22" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
  <rect x="110" y="70" width="30" height="22" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
  <text font-size="8" fill="#6b7280" x="110" y="106" text-anchor="middle">Caisses OK</text>

  <!-- Differdange — panne -->
  <rect x="230" y="40" width="160" height="64" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="1.5"/>
  <text font-size="12" font-weight="700" fill="#991b1b" x="310" y="60" text-anchor="middle">Differdange</text>
  <rect x="270" y="70" width="30" height="22" rx="3" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
  <text font-size="14" font-weight="700" fill="#dc2626" x="285" y="86" text-anchor="middle">✕</text>
  <rect x="310" y="70" width="30" height="22" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
  <text font-size="8" fill="#991b1b" x="310" y="106" text-anchor="middle">Caisse en panne !</text>

  <!-- Esch / Bonnevoie -->
  <rect x="430" y="40" width="160" height="64" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text font-size="12" font-weight="700" fill="#1e40af" x="510" y="60" text-anchor="middle">Esch / Bonnevoie</text>
  <rect x="470" y="70" width="30" height="22" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
  <rect x="510" y="70" width="30" height="22" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
  <text font-size="8" fill="#6b7280" x="510" y="106" text-anchor="middle">Caisses OK</text>

  <!-- Flèche depuis Differdange vers ticket -->
  <line x1="310" y1="104" x2="310" y2="138" stroke="#f87171" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Ticket support -->
  <rect x="194" y="140" width="232" height="44" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text font-size="13" font-weight="700" fill="#78350f" x="310" y="158" text-anchor="middle">Ticket créé dans EasyVista</text>
  <text font-size="10" fill="#92400e" x="310" y="174" text-anchor="middle">Incident signalé, prise en charge immédiate</text>

  <!-- Flèche vers intervention -->
  <line x1="310" y1="184" x2="310" y2="218" stroke="#9ca3af" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Intervention technicien -->
  <rect x="160" y="220" width="300" height="44" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.2"/>
  <text font-size="13" font-weight="700" fill="#92400e" x="310" y="238" text-anchor="middle">Intervention technicien</text>
  <text font-size="10" fill="#c2410c" x="310" y="254" text-anchor="middle">À distance ou déplacement sur site</text>

  <!-- Flèche vers résolution -->
  <line x1="310" y1="264" x2="310" y2="298" stroke="#9ca3af" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Caisse remise en service -->
  <rect x="174" y="300" width="272" height="44" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.2"/>
  <text font-size="13" font-weight="700" fill="#065f46" x="310" y="318" text-anchor="middle">Caisse remise en service ✓</text>
  <text font-size="10" fill="#047857" x="310" y="334" text-anchor="middle">Activité commerciale reprise sans interruption</text>

  <!-- Légende -->
  <rect x="40" y="354" width="540" height="10" rx="5" fill="none" stroke="none"/>
  <rect x="40" y="354" width="12" height="10" rx="2" fill="#fee2e2" stroke="#f87171" stroke-width="0.8"/>
  <text font-size="10" fill="#374151" x="60" y="364">Caisse en panne</text>
  <rect x="170" y="354" width="12" height="10" rx="2" fill="#fef9c3" stroke="#ca8a04" stroke-width="0.8"/>
  <text font-size="10" fill="#374151" x="190" y="364">Ticket EasyVista</text>
  <rect x="300" y="354" width="12" height="10" rx="2" fill="#fff7ed" stroke="#fb923c" stroke-width="0.8"/>
  <text font-size="10" fill="#374151" x="320" y="364">Intervention</text>
  <rect x="410" y="354" width="12" height="10" rx="2" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-size="10" fill="#374151" x="430" y="364">Résolution</text>
</svg>
