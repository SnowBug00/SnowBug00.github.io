<svg width="620" height="300" viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="620" height="300" fill="#ffffff"/>

  <!-- Titre -->
  <text font-size="13" font-weight="700" fill="#1a1a1a" x="310" y="22" text-anchor="middle">Projet 3 — Migration Citrix vers postes HP sous domaine Windows</text>

  <!-- ── AVANT ── -->
  <text font-size="10" font-weight="700" fill="#9ca3af" x="130" y="44" text-anchor="middle" letter-spacing="1">AVANT</text>

  <rect x="40" y="52" width="180" height="52" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="1.2"/>
  <text font-size="13" font-weight="700" fill="#991b1b" x="130" y="74" text-anchor="middle">Serveur Citrix</text>
  <text font-size="10" fill="#b91c1c" x="130" y="92" text-anchor="middle">Infrastructure centralisée</text>

  <line x1="90"  y1="104" x2="72"  y2="142" stroke="#fca5a5" stroke-width="1"/>
  <line x1="130" y1="104" x2="130" y2="142" stroke="#fca5a5" stroke-width="1"/>
  <line x1="170" y1="104" x2="188" y2="142" stroke="#fca5a5" stroke-width="1"/>

  <rect x="50"  y="142" width="44" height="34" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
  <rect x="108" y="142" width="44" height="34" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>
  <rect x="166" y="142" width="44" height="34" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.8"/>

  <text font-size="9" fill="#dc2626" x="72"  y="163" text-anchor="middle">Terminal</text>
  <text font-size="9" fill="#dc2626" x="130" y="163" text-anchor="middle">Terminal</text>
  <text font-size="9" fill="#dc2626" x="188" y="163" text-anchor="middle">Terminal</text>
  <text font-size="9" fill="#9ca3af" x="130" y="192" text-anchor="middle">Sans disque dur — dépend du serveur</text>

  <!-- ── FLÈCHE MIGRATION ── -->
  <line x1="238" y1="104" x2="372" y2="104" stroke="#f97316" stroke-width="2.5"/>
  <polygon points="374,104 362,98 362,110" fill="#f97316"/>
  <rect x="262" y="90" width="88" height="20" rx="5" fill="#fff7ed" stroke="#fb923c" stroke-width="0.8"/>
  <text font-size="10" font-weight="700" fill="#c2410c" x="306" y="104" text-anchor="middle">Migration</text>

  <!-- ── APRÈS ── -->
  <text font-size="10" font-weight="700" fill="#9ca3af" x="490" y="44" text-anchor="middle" letter-spacing="1">APRÈS</text>

  <rect x="400" y="52" width="180" height="52" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.2"/>
  <text font-size="13" font-weight="700" fill="#065f46" x="490" y="74" text-anchor="middle">Domaine Windows</text>
  <text font-size="10" fill="#047857" x="490" y="92" text-anchor="middle">Active Directory</text>

  <line x1="450" y1="104" x2="432" y2="142" stroke="#6ee7b7" stroke-width="1"/>
  <line x1="490" y1="104" x2="490" y2="142" stroke="#6ee7b7" stroke-width="1"/>
  <line x1="530" y1="104" x2="548" y2="142" stroke="#6ee7b7" stroke-width="1"/>

  <rect x="410" y="142" width="44" height="34" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <rect x="468" y="142" width="44" height="34" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <rect x="526" y="142" width="44" height="34" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>

  <text font-size="9" fill="#065f46" x="432" y="163" text-anchor="middle">PC HP</text>
  <text font-size="9" fill="#065f46" x="490" y="163" text-anchor="middle">PC HP</text>
  <text font-size="9" fill="#065f46" x="548" y="163" text-anchor="middle">PC HP</text>
  <text font-size="9" fill="#9ca3af" x="490" y="192" text-anchor="middle">Postes individuels autonomes</text>

  <!-- ── LÉGENDE ── -->
  <rect x="40" y="208" width="540" height="76" rx="7" fill="none" stroke="#d1d5db" stroke-width="0.8"/>
  <text font-size="11" font-weight="700" fill="#1a1a1a" x="60" y="226">Légende</text>

  <rect x="60" y="238" width="12" height="10" rx="2" fill="#fee2e2" stroke="#f87171" stroke-width="0.8"/>
  <text font-size="10" fill="#374151" x="80" y="248">Citrix — terminaux sans disque dur, dépendants d'un serveur central distant</text>

  <rect x="60" y="260" width="12" height="10" rx="2" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-size="10" fill="#374151" x="80" y="270">Postes HP — machines individuelles intégrées au domaine Windows (Active Directory)</text>
