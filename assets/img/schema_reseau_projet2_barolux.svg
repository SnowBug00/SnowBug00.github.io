<svg width="620" height="380" viewBox="0 0 620 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

  <!-- Fond -->
  <rect width="620" height="380" fill="#ffffff"/>

  <!-- Titre -->
  <text font-size="13" font-weight="700" fill="#1a1a1a" x="310" y="26" text-anchor="middle">Projet 2 — Interconnexion des sites Barolux via tunnels IPsec</text>

  <!-- ══════════════════════════════
       SITE DUDELANGE — CŒUR (centre)
  ══════════════════════════════ -->
  <rect x="200" y="148" width="220" height="72" rx="10" fill="#fee2e2" stroke="#f87171" stroke-width="1.5"/>
  <text font-size="10" font-weight="700" fill="#6b7280" x="310" y="166" text-anchor="middle" letter-spacing="1">SITE CŒUR</text>
  <text font-size="14" font-weight="700" fill="#991b1b" x="310" y="184" text-anchor="middle">Fortinet — Dudelange</text>
  <text font-size="10" fill="#b91c1c" x="310" y="202" text-anchor="middle">Concentrateur VPN · Cœur du réseau</text>

  <!-- ══════════════════════════════
       SITE KIRCHBERG (haut gauche)
  ══════════════════════════════ -->
  <rect x="44" y="56" width="188" height="64" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text font-size="10" font-weight="700" fill="#6b7280" x="138" y="73" text-anchor="middle" letter-spacing="1">SITE</text>
  <text font-size="14" font-weight="700" fill="#78350f" x="138" y="92" text-anchor="middle">Fortinet — Kirchberg</text>
  <text font-size="10" fill="#92400e" x="138" y="110" text-anchor="middle">Équipements techniques</text>

  <!-- ══════════════════════════════
       SITE DIFFERDANGE (haut droite)
  ══════════════════════════════ -->
  <rect x="388" y="56" width="188" height="64" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text font-size="10" font-weight="700" fill="#6b7280" x="482" y="73" text-anchor="middle" letter-spacing="1">SITE</text>
  <text font-size="14" font-weight="700" fill="#78350f" x="482" y="92" text-anchor="middle">Fortinet — Differdange</text>
  <text font-size="10" fill="#92400e" x="482" y="110" text-anchor="middle">Équipements techniques</text>

  <!-- ══════════════════════════════
       TUNNEL Kirchberg → Dudelange
  ══════════════════════════════ -->
  <!-- ligne pointillée orange -->
  <line x1="190" y1="110" x2="248" y2="152" stroke="#f97316" stroke-width="2.2" stroke-dasharray="9 5"/>
  <!-- flèche bout -->
  <polygon points="248,152 238,143 244,158" fill="#f97316"/>
  <!-- label tunnel -->
  <rect x="168" y="121" width="100" height="20" rx="5" fill="#fff7ed" stroke="#fb923c" stroke-width="0.8"/>
  <text font-size="10" font-weight="700" fill="#c2410c" x="218" y="135" text-anchor="middle">Tunnel IPsec</text>

  <!-- ══════════════════════════════
       TUNNEL Differdange → Dudelange
  ══════════════════════════════ -->
  <line x1="430" y1="110" x2="372" y2="152" stroke="#f97316" stroke-width="2.2" stroke-dasharray="9 5"/>
  <polygon points="372,152 375,140 382,153" fill="#f97316"/>
  <rect x="352" y="121" width="100" height="20" rx="5" fill="#fff7ed" stroke="#fb923c" stroke-width="0.8"/>
  <text font-size="10" font-weight="700" fill="#c2410c" x="402" y="135" text-anchor="middle">Tunnel IPsec</text>

  <!-- ══════════════════════════════
       DONNÉES REMONTÉES (bas)
  ══════════════════════════════ -->
  <line x1="310" y1="220" x2="310" y2="272" stroke="#059669" stroke-width="1.8" stroke-dasharray="5 3"/>
  <polygon points="310,272 303,260 317,260" fill="#059669"/>

  <rect x="194" y="272" width="232" height="52" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text font-size="13" font-weight="700" fill="#065f46" x="310" y="294" text-anchor="middle">Supervision centralisée</text>
  <text font-size="10" fill="#047857" x="310" y="312" text-anchor="middle">Données des équipements automatismes</text>

  <!-- ══════════════════════════════
       LÉGENDE
  ══════════════════════════════ -->
  <rect x="44" y="340" width="532" height="28" rx="7" fill="none" stroke="#d1d5db" stroke-width="0.8"/>

  <line x1="64" y1="354" x2="104" y2="354" stroke="#f97316" stroke-width="2" stroke-dasharray="8 4"/>
  <text font-size="10" fill="#374151" x="112" y="358">Tunnel IPsec (communication chiffrée entre sites)</text>

  <line x1="310" y1="354" x2="350" y2="354" stroke="#059669" stroke-width="1.8" stroke-dasharray="5 3"/>
  <text font-size="10" fill="#374151" x="358" y="358">Données remontées vers la supervision</text>

</svg>
